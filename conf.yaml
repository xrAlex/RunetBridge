build:
  derive_cidr: true
  output: dist/ru.yaml

custom:
  target_dir: custom
  groups:
    common:
      - 2ip.yaml
      - boosty.yaml
      - default.yaml
      - donationalerts.yaml
      - max.yaml
      - memealerts.yaml
      - rutube.yaml
      - youla.yaml
      - zona.yaml
    games:
      - bohemia_interactive.yaml
      - creative_assembly.yaml
      - helldivers2.yaml
      - lesta.yaml
      - steam.yaml

providers:
  - name: blackmatrix7
    target_dir: providers/blackmatrix7
    files:
      GitHub.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GitHub/GitHub.yaml
    groups:
      games:
        Epic.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Epic/Epic.yaml
        Sony.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Sony/Sony.yaml
        Xbox.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Xbox/Xbox.yaml
        Steam.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Steam/Steam.yaml
        EA.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/EA/EA.yaml
        Blizzard.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Blizzard/Blizzard.yaml
        2KGames.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/2KGames/2KGames.yaml
        Overwatch.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Overwatch/Overwatch.yaml
        Hearthstone.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Hearthstone/Hearthstone.yaml
        StarCraft2.mihomo: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/StarCraftII/StarCraftII.yaml

  - name: itdoginfo
    target_dir: providers/itdoginfo
    files:
      Only_from_russia.mihomo: https://raw.githubusercontent.com/itdoginfo/allow-domains/main/Russia/outside-clashx.lst

  - name: v2fly
    target_dir: providers/v2fly
    files:
      2ch.raw: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/2ch
      2gis.raw: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/2gis
      Aviasales.raw: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/aviasales
      Dzen.raw: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/dzen
      Kinopoisk.raw: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/kinopoisk
      Ozon.raw: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data/ozon

  - name: hxehex
    target_dir: providers/hxehex
    files:
      Whitelist_domains.raw: https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/whitelist.txt
      Whitelist_cidr.raw: https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/cidrwhitelist.txt

  - name: HYBB-rash
    target_dir: providers/HYBB-rash
    groups:
      torrent_trackers:
        Torrent_trackers.mihomo: https://raw.githubusercontent.com/HYBB-rash/trackers_list_rule/refs/heads/main/dist/trackers_list_rule.yaml

